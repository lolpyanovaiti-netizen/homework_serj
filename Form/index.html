<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Form</title>
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<form class="form">
			<fieldset class="fieldset">
				<legend class="legend">Ваши личные данные</legend>
				<label class="label">
					Ваше имя
					<input
						class="input"
						type="text"
						required
						name="name"
						placeholder="Имя"
					/>
				</label>
				<label class="label">
					Ваш возраст
					<input
						class="input"
						type="number"
						required
						name="age"
						placeholder="Возраст"
					/>
				</label>
				<label class="label">
					Ваш номер телефона
					<input
						class="input"
						type="tel"
						required
						name="tel"
						placeholder="Номер телефона"
					/>
				</label>
				<label class="label">
					Ваша почта
					<input
						class="input"
						type="email"
						required
						name="email"
						placeholder="Почта"
					/>
				</label>
			</fieldset>
			<fieldset class="fieldset fieldset_area">
				<label class="label_area"
					>Сообщение
					<textarea class="textarea input" name="message" required></textarea>
				</label>
				<label class="label_checkbox">
					<input type="checkbox" required name="agreement" />
					Я принимаю правила
				</label>
			</fieldset>
			<button class="button" type="submit">Отправить</button>
		</form>
	</body>
</html>
