<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Form</title>
		<link rel="stylesheet" href="./css/normalize.css" />
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<form class="form">
			<fieldset class="fieldset">
				<legend class="legend">Ваши личные данные</legend>
				<label for="name" class="label">
					Ваше имя
					<input
						id="name"
						class="input"
						type="text"
						required
						name="name"
						placeholder="Имя"
					/>
				</label>
				<label for="age" class="label">
					Ваш возраст
					<input
						id="age"
						class="input"
						type="number"
						required
						name="age"
						placeholder="Возраст"
					/>
				</label>
				<label for="tel" class="label">
					Ваш номер телефона
					<input
						id="tel"
						class="input"
						type="tel"
						required
						name="tel"
						placeholder="Номер телефона"
					/>
				</label>
				<label for="email" class="label">
					Ваша почта
					<input
						id="email"
						class="input"
						type="email"
						required
						name="email"
						placeholder="Почта"
					/>
				</label>
			</fieldset>
			<fieldset class="fieldset fieldset_area">
				<label class="label_area"
					>Сообщение
					<textarea
						class="textarea input"
						name="message"
						required
						placeholder="Ваше сообщение"
					></textarea>
				</label>
				<label class="label-checkbox">
					<input class="checkbox" type="checkbox" required name="agreement" />
					<span class="checkbox-text">Я принимаю правила</span>
				</label>
			</fieldset>
			<button class="button" type="submit">Отправить</button>
		</form>
	</body>
</html>
